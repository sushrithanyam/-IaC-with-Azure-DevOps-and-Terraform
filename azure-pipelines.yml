trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: cloudtask-pro
  acrLogin: cloudtaskacr12345.azurecr.io
  tag: $(Build.BuildId)

stages:

# -----------------------
# TERRAFORM STAGE
# -----------------------
- stage: Terraform
  jobs:
  - job: tf
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - script: |
        cd terraform
        terraform init
      displayName: Init

    - script: |
        cd terraform
        terraform validate
      displayName: Validate

    - script: |
        cd terraform
        terraform plan
      displayName: Plan
# -----------------------
# BUILD & PUSH IMAGE
# -----------------------
- stage: Build
  displayName: Build & Push Docker Image
  dependsOn: Terraform

  jobs:
  - job: docker
    steps:

    - task: Docker@2
      inputs:
        containerRegistry: ACR-Service-Connection
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: Dockerfile
        buildContext: .
        tags: |
          $(tag)


# -----------------------
# DEPLOY TO VM
# -----------------------
- stage: Deploy
  displayName: Deploy to Azure VM
  dependsOn: Build

  jobs:
  - job: deploy
    steps:

    - task: SSH@0
      inputs:
        sshEndpoint: AzureVM-SSH
        runOptions: commands
        commands: |

          echo "Logging into ACR..."

          docker login $(acrLogin) \
            -u $(ACR_USERNAME) \
            -p $(ACR_PASSWORD)

          echo "Pulling image..."

          docker pull $(acrLogin)/$(imageName):$(tag)

          echo "Stopping old container..."

          docker stop cloudtask || true
          docker rm cloudtask || true

          echo "Starting new container..."

          docker run -d -p 5000:5000 --name cloudtask \
            $(acrLogin)/$(imageName):$(tag)